<!DOCTYPE html>
<html>

<head>
    <title>AgroGuard Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🌱 AGROGUARD DASHBOARD</h1>

    <button id="connect">Connect Arduino</button>

    <div class="card">
        <h2>Selected Crop</h2>
        <p id="crop">--</p>
    </div>

    <div class="card">
        <h2>Soil Moisture</h2>
        <p id="soil">--</p>
    </div>

    <div class="card">
        <h2>Temperature</h2>
        <p id="temp">--</p>
    </div>

    <div class="card">
        <h2>Humidity</h2>
        <p id="humidity">--</p>
    </div>

    <div class="card">
        <h2>Water Level</h2>
        <p id="tank">--</p>
    </div>

    <div class="card">
        <h2>Farm Health Index</h2>
        <p id="fhi">--</p>
    </div>

    <div class="recommendation">
        <h2>Recommendation</h2>
        <p id="recommendation">--</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
